# Safety policy for hacking-mcp
# Controls which tools/categories are exposed via MCP and under what conditions

# Categories permanently excluded from MCP
disabled_categories:
  - "DDOS Attack"
  - "Remote Administration (RAT)"
  - "Payload Creation"
  - "Phishing Attack"
  - "Wireless Attack"
  - "Anonymously Hiding"

# Individual tools permanently excluded
disabled_tools:
  - "Chrome Keylogger"
  - "Vegile"
  - "Spycam"
  - "SayCheese"

# Categories that require explicit user confirmation per invocation
require_confirmation_categories:
  - "SQL Injection"
  - "Exploit Framework"
  - "Post Exploitation"
  - "XSS Attack"

# Execution limits
max_execution_timeout_seconds: 300
max_output_bytes: 52428800  # 50MB

# Target scope (empty = allow all)
# Define authorized IP ranges / domains for professional pentesting
scope:
  allowed_cidrs: []
  allowed_domains: []
  # Example:
  # allowed_cidrs:
  #   - "10.0.0.0/8"
  #   - "192.168.1.0/24"
  # allowed_domains:
  #   - "example.com"
  #   - "*.test.local"

# Proxy for tool downloads (git clone, pip install, curl, etc.)
# Only used during installation — security tool execution never uses proxy.
# Uncomment and set your proxy if downloads fail due to network restrictions:
# proxy:
#   http: "http://127.0.0.1:8080"
#   https: "http://127.0.0.1:8080"
#   no_proxy: "localhost,127.0.0.1,.local"

# Mirror sources for faster tool downloads (uncomment for China-friendly mirrors)
mirrors:
  pip: "https://pypi.tuna.tsinghua.edu.cn/simple"
  apt: "http://mirrors.tuna.tsinghua.edu.cn/ubuntu"
  go: "https://goproxy.cn,direct"
  gem: "https://gems.ruby-china.com"
  git: ""  # e.g. "https://ghproxy.net/" for GitHub proxy
